# TaskFlow — docker-compose.yml
# Usage:
#   cp .env.example .env   (edit values if desired)
#   docker compose up -d
#
# Services:
#   postgres  — PostgreSQL 16
#   api       — Go REST API (runs migrations on start, then serves on :8080)
#   seed      — one-shot seeder (exits after inserting demo data)
#   frontend  — React/Vite SPA served via nginx (proxies /api → api:8080)
#   npm       — Nginx Proxy Manager (admin UI on :81, proxies 80/443)

services:
  # ── Database ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-taskflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-taskflow_password}
      POSTGRES_DB:       ${DB_NAME:-taskflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-taskflow} -d ${DB_NAME:-taskflow}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - internal

  # ── API Server ───────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT:         ${PORT:-8080}
      ENV:          ${ENV:-production}
      JWT_SECRET:   ${JWT_SECRET}
      DB_HOST:      postgres
      DB_PORT:      5432
      DB_USER:      ${DB_USER:-taskflow}
      DB_PASSWORD:  ${DB_PASSWORD:-taskflow_password}
      DB_NAME:      ${DB_NAME:-taskflow}
      DB_SSLMODE:   ${DB_SSLMODE:-disable}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  # ── Seed (runs once, exits) ──────────────────────────────────────────────────
  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    entrypoint: ["/seed"]
    environment:
      JWT_SECRET:   ${JWT_SECRET}
      DB_HOST:      postgres
      DB_PORT:      5432
      DB_USER:      ${DB_USER:-taskflow}
      DB_PASSWORD:  ${DB_PASSWORD:-taskflow_password}
      DB_NAME:      ${DB_NAME:-taskflow}
      DB_SSLMODE:   ${DB_SSLMODE:-disable}
    depends_on:
      api:
        condition: service_started
    restart: "no"
    networks:
      - internal

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - internal
      - proxy

  # ── Nginx Proxy Manager ──────────────────────────────────────────────────────
  npm:
    image: jc21/nginx-proxy-manager:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    networks:
      - proxy

volumes:
  postgres_data:
  npm_data:
  npm_letsencrypt:

networks:
  internal:
    driver: bridge
  proxy:
    driver: bridge
